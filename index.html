<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cat Combat</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: #4ecca3; }
        .score { font-size: 48px; font-weight: bold; margin-bottom: 5px; }
        .profit { font-size: 16px; color: #a0aec0; margin-bottom: 30px; }
        .cat-container {
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
            transition: transform 0.1s ease;
        }
        .cat-container:active { transform: scale(0.95); }
        .upgrades { margin-top: 40px; display: flex; gap: 15px; }
        .btn {
            background-color: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:disabled { background-color: #4a5568; color: #a0aec0; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">CAT COMBAT</div>
    <div class="score" id="balance">0</div>
    <div class="profit" id="piph">Прибыль в час: +0</div>

    <!-- Главный кот для тапов -->
    <div class="cat-container" id="catBtn">🐱</div>

    <!-- Магазин карточек прокачки -->
    <div class="upgrades">
        <button class="btn" id="upgradeBtn" onclick="buyUpgrade()">
            Купить карточку <br> (Цена: 50 | ПВЧ: +5)
        </button>
    </div>

    <script>
        let coins = 0;
        let profitPerHour = 0;
        let upgradeCost = 50;

        const balanceEl = document.getElementById('balance');
        const piphEl = document.getElementById('piph');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const catBtn = document.getElementById('catBtn');

        // Клик по коту
        catBtn.addEventListener('click', () => {
            coins += 1;
            updateUI();
        });

        // Покупка карточки улучшения (Пассивный доход)
        function buyUpgrade() {
            if (coins >= upgradeCost) {
                coins -= upgradeCost;
                profitPerHour += 5;
                upgradeCost = Math.round(upgradeCost * 1.5); // Цена растет
                updateUI();
            }
        }

        // Обновление интерфейса
        function updateUI() {
            balanceEl.innerText = Math.floor(coins);
            piphEl.innerText = `Прибыль в час: +${profitPerHour}`;
            upgradeBtn.innerHTML = `Купить карточку <br> (Цена: ${upgradeCost} | ПВЧ: +5)`;
            upgradeBtn.disabled = coins < upgradeCost;
        }

        // Таймер пассивного дохода (начисление каждую секунду)
        setInterval(() => {
            if (profitPerHour > 0) {
                coins += (profitPerHour / 3600); // Доход в секунду
                updateUI();
            }
        }, 1000);
    </script>
</body>
</html>
